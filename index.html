<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koneksi Web Bluetooth ESP32</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    button:hover { background-color: #0056b3; }
    #log { margin-top: 20px; padding: 10px; background-color: #f4f4f4; text-align: left; display: inline-block; width: 80%; min-height: 100px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h2>Uji Koneksi Web Bluetooth ESP32</h2>
  <button onclick="connectBLE()">Hubungkan ke ESP32</button>
  
  <p id="status">Status: Terputus</p>
  <div id="log">Tekan tombol di atas untuk memulai koneksi...</div>

  <script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a7";

    async function connectBLE() {
      const statusText = document.getElementById("status");
      const logText = document.getElementById("log");

      try {
        statusText.innerText = "Status: Memindai perangkat...";
        logText.innerText = "Membuka antarmuka Bluetooth...";

        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });

        statusText.innerText = "Status: Menghubungkan ke " + device.name + "...";
        const server = await device.gatt.connect();
        
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        statusText.innerText = "Status: Terhubung";
        logText.innerText = "Berhasil tersambung ke perangkat BLE!";

        const value = await characteristic.readValue();
        let decoder = new TextDecoder('utf-8');
        logText.innerText += "\nData diterima: " + decoder.decode(value);

        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          let val = event.target.value;
          logText.innerText += "\nNotifikasi: " + decoder.decode(val);
        });

      } catch(error) {
        statusText.innerText = "Status: Gagal / Dibatalkan";
        logText.innerText = "Error: " + error;
        console.error(error);
      }
    }
  </script>
</body>
</html>
